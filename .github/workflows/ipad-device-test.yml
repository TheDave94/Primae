name: "iPad Device Test (manual)"
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ipad_device:
    name: "Build & Run on real iPad"
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check iPad connected
        run: |
          xcrun xctrace list devices 2>&1 | grep -i ipad || {
            echo "❌ No iPad detected. Connect and unlock your iPad first."
            exit 1
          }

      - name: Build for device
        run: |
          set -o pipefail
          xcodebuild build \
            -project BuchstabenApp/BuchstabenApp.xcodeproj \
            -scheme BuchstabenApp \
            -destination 'platform=iOS,name=iPad' \
            -configuration Debug \
            2>&1 | tee /tmp/ipad-build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipad-device-build-log
          if-no-files-found: warn
          path: /tmp/ipad-build.log
