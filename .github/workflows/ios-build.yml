name: "iOS Build & Test"
on:
  push:
    branches: ["main", "ux/**"]
  pull_request:
    branches: ["main", "ux/**"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Swift Package tests on Ubuntu ─────────────────────────────────
  # Fast (~2min), no simulator, catches type/concurrency/logic errors.
  # Uses swift test directly — no Xcode needed.
  spm_test:
    name: "SPM Unit Tests (Ubuntu / Swift 6)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.cache/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('BuchstabenNative/Package.swift', 'BuchstabenNative/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Build & Test (Swift Package)
        working-directory: BuchstabenNative
        run: |
          swift build --build-tests -Xswiftc -strict-concurrency=complete
          swift test --parallel 2>&1 | tee /tmp/spm-test.log
          echo "Exit: ${PIPESTATUS[0]}"

      - name: Upload SPM test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spm-test-log
          if-no-files-found: warn
          path: /tmp/spm-test.log

  # ── Job 2: Xcode build & test on GitHub-hosted macOS 15 ──────────────────
  # Uses Xcode 16.4 (runner default — no xcode-select override).
  # Tests on iPad (10th generation) — confirmed pre-installed on macos-15.
  xcode_test:
    name: "Xcode Test — iPad Simulator (macos-15)"
    runs-on: macos-15
    needs: spm_test
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache SPM dependencies (Xcode)
        uses: irgaly/xcode-cache@v1
        with:
          key: xcode-spm-${{ hashFiles('BuchstabenApp/BuchstabenApp.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: xcode-spm-

      - name: Build & Test — iPad (10th generation)
        run: |
          set -o pipefail
          xcodebuild test \
            -project BuchstabenApp/BuchstabenApp.xcodeproj \
            -scheme BuchstabenApp \
            -destination 'platform=iOS Simulator,name=iPad (10th generation),OS=latest' \
            -configuration Debug \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath /tmp/TestResults.xcresult \
            2>&1 | xcbeautify --renderer github-actions | tee /tmp/xcode-test.log

      - name: Extract failure summary
        if: failure()
        run: |
          ERRORS=$(grep -E "error:|XCTAssert.*failed|#expect.*failed|Test.*failed|FAILED" \
            /tmp/xcode-test.log 2>/dev/null \
            | grep -v "^Binary" | head -15 \
            || echo "See run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")
          printf '%s' "$ERRORS" > /tmp/ci_errors.txt
          cat /tmp/ci_errors.txt

      - name: Inject priority task into council queue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CI_ERRORS=$(cat /tmp/ci_errors.txt 2>/dev/null || echo "unknown")
          TASK="[P1-ci-fix] Fix CI failure on ${{ github.ref_name }}: $(echo "$CI_ERRORS" | head -3 | tr '\n' ' ') — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          QUEUE_FILE="task-queue.md"
          if [ -f "$QUEUE_FILE" ]; then
            python3 - "$QUEUE_FILE" "$TASK" << 'PY'
          import sys
          path, task = sys.argv[1], sys.argv[2]
          with open(path) as f: lines = f.readlines()
          out = []
          for l in lines:
              out.append(l)
              if l.strip() == '## Pending':
                  out.append(f'- [ios] {task}\n')
          with open(path, 'w') as f: f.writelines(out)
          PY
            git config user.email "ci@github-actions"
            git config user.name "GitHub Actions"
            git add task-queue.md
            git commit -m "ci: inject P1 fix task for failing build"
            git push
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-test-results
          if-no-files-found: warn
          path: |
            /tmp/xcode-test.log
            /tmp/TestResults.xcresult

  # ── Job 3: Forward-compat test on macOS 26 / Xcode 26 ────────────────────
  # Non-blocking (continue-on-error). Catches API deprecations early.
  # April 2026: App Store requires Xcode 26. This job tracks that migration.
  xcode26_compat:
    name: "Xcode 26 Forward-Compat (non-blocking)"
    runs-on: macos-26
    needs: spm_test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build only (no test — compat check)
        run: |
          set -o pipefail
          xcodebuild build \
            -project BuchstabenApp/BuchstabenApp.xcodeproj \
            -scheme BuchstabenApp \
            -destination 'platform=iOS Simulator,name=iPad (10th generation),OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | xcbeautify --renderer github-actions

  # ── Job 4: Self-hosted MacBook — device-specific validation ──────────────
  # Only runs if both spm_test and xcode_test pass.
  # Validates on your exact local iPad simulator configuration.
  device_test:
    name: "Device Test (MacBook self-hosted)"
    runs-on: self-hosted
    needs: [spm_test, xcode_test]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: List available simulators
        run: xcrun simctl list devices available | grep -i ipad

      - name: Build & Test (local iPad simulator)
        run: |
          set -o pipefail
          xcodebuild test \
            -project BuchstabenApp/BuchstabenApp.xcodeproj \
            -scheme BuchstabenApp \
            -destination 'platform=iOS Simulator,name=iPad (10th generation)' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/test-device.log

      - name: Upload device test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-device-test-log
          if-no-files-found: warn
          path: /tmp/test-device.log
