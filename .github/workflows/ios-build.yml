name: "iOS Build & Test"
on:
  push:
    branches: ["main", "ux/**"]
  pull_request:
    branches: ["main", "ux/**"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  xcode_test:
    name: "Build & Test — iPad Simulator (macos-26 / Xcode 26)"
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Show Xcode + Swift version
        run: |
          xcodebuild -version
          swift --version

      - name: List available iPad simulators
        run: xcrun simctl list devices available | grep -i ipad

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project BuchstabenApp/BuchstabenApp.xcodeproj \
            -scheme BuchstabenApp

      - name: Build & Test — iPad simulator
        run: |
          set -o pipefail
          xcodebuild test \
            -project BuchstabenApp/BuchstabenApp.xcodeproj \
            -scheme BuchstabenApp \
            -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M5),OS=latest' \
            -configuration Debug \
            -enableCodeCoverage NO \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath /tmp/TestResults.xcresult \
            2>&1 | tee /tmp/xcode-test.log

      - name: Extract failure summary
        if: failure()
        run: |
          ERRORS=$(grep -E "error:|#expect.*failed|XCTAssert.*failed|Test.*FAILED" \
            /tmp/xcode-test.log 2>/dev/null \
            | grep -v "^Binary" | head -15 \
            || echo "See run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")
          printf '%s' "$ERRORS" > /tmp/ci_errors.txt
          cat /tmp/ci_errors.txt

      - name: Inject priority task into council queue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CI_ERRORS=$(cat /tmp/ci_errors.txt 2>/dev/null || echo "unknown")
          TASK="[P1-ci-fix] Fix CI failure on ${{ github.ref_name }}: $(echo "$CI_ERRORS" | head -3 | tr '\n' ' ') — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          QUEUE_FILE="task-queue.md"
          if [ -f "$QUEUE_FILE" ]; then
            python3 - "$QUEUE_FILE" "$TASK" << 'PY'
          import sys
          path, task = sys.argv[1], sys.argv[2]
          with open(path) as f: lines = f.readlines()
          out = []
          for l in lines:
              out.append(l)
              if l.strip() == '## Pending':
                  out.append(f'- [ios] {task}\n')
          with open(path, 'w') as f: f.writelines(out)
          PY
            git config user.email "ci@github-actions"
            git config user.name "GitHub Actions"
            git add task-queue.md
            git commit -m "ci: inject P1 fix task for failing build"
            git push
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: xcode-test-results
          if-no-files-found: warn
          path: |
            /tmp/xcode-test.log
            /tmp/TestResults.xcresult

  device_test:
    name: "Device Test (MacBook self-hosted)"
    runs-on: self-hosted
    needs: xcode_test
    continue-on-error: true  # self-hosted runner infrastructure issues (log file conflicts)
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: List available iPad simulators
        run: xcrun simctl list devices available | grep -i ipad
      - name: Build & Test (local simulator)
        run: |
          set -o pipefail
          xcodebuild test \
            -project BuchstabenApp/BuchstabenApp.xcodeproj \
            -scheme BuchstabenApp \
            -destination 'platform=iOS Simulator,name=iPad (A16)' \
            -configuration Debug \
            -enableCodeCoverage NO \
            -derivedDataPath /tmp/DerivedData-BuchstabenApp \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_DEBUG_DYLIB=NO \
            2>&1 | tee /tmp/test-device.log

