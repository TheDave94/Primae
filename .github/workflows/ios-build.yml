name: "iOS Build & Test"
on:
  push:
    branches: ["main", "ux/**", "roadmap-*"]
  pull_request:
    branches: ["main", "ux/**", "roadmap-*"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  xcode_test:
    name: "Build & Test — iPad Simulator (macos-26 / Xcode 26)"
    runs-on: macos-26
    # D9 (ROADMAP_V5): hard cap on the simulator job so a hung
    # xcodebuild can't sit at "in_progress" until GitHub's 6-hour
    # default kills it. Typical completion is 4–7 minutes; 20 is
    # generous headroom.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 26.4
        run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer

      - name: Show Xcode + Swift version
        run: |
          xcodebuild -version
          swift --version

      - name: List available iPad simulators
        run: xcrun simctl list devices available | grep -i ipad

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project BuchstabenApp/BuchstabenApp.xcodeproj \
            -scheme BuchstabenApp

      - name: Build & Test — iPad simulator
        run: |
          set -o pipefail
          xcodebuild test \
            -project BuchstabenApp/BuchstabenApp.xcodeproj \
            -scheme BuchstabenApp \
            -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M5),OS=latest' \
            -configuration Debug \
            -enableCodeCoverage NO \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath /tmp/TestResults.xcresult \
            2>&1 | tee /tmp/xcode-test.log

      - name: Extract failure summary
        if: failure()
        run: |
          ERRORS=$(grep -E "error:|#expect.*failed|XCTAssert.*failed|Test.*FAILED" \
            /tmp/xcode-test.log 2>/dev/null \
            | grep -v "^Binary" | head -15 \
            || echo "See run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")
          printf '%s' "$ERRORS" > /tmp/ci_errors.txt
          cat /tmp/ci_errors.txt

      # NOTE: P1 fix tasks are now injected automatically by AutoCoder ci_fix.py
      # via polling GitHub CI — no workflow step needed

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: xcode-test-results
          if-no-files-found: warn
          path: |
            /tmp/xcode-test.log
            /tmp/TestResults.xcresult

  device_test:
    name: "Device Test (MacBook self-hosted)"
    runs-on: self-hosted
    needs: xcode_test
    # D9 (ROADMAP_V5): hard cap on the self-hosted device test. Has
    # occasionally sat at "in_progress" for 30+ minutes when the
    # MacBook is loaded; 25 minutes is comfortable headroom over the
    # typical 10–15 minute completion.
    timeout-minutes: 25
    steps:
      - name: Clean runner diagnostics
        run: rm -f ~/actions-runner/_diag/pages/*.log ~/actions-runner/_diag/*.log || true
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: List available iPad simulators
        run: xcrun simctl list devices available | grep -i ipad
      - name: Build & Test (local simulator)
        run: |
          set -o pipefail
          xcodebuild test \
            -project BuchstabenApp/BuchstabenApp.xcodeproj \
            -scheme BuchstabenApp \
            -destination 'platform=iOS Simulator,name=iPad (A16)' \
            -configuration Debug \
            -enableCodeCoverage NO \
            -derivedDataPath /Users/musicbox/DerivedData-CI \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_DEBUG_DYLIB=NO \
            2>&1 | tee /tmp/test-device.log

