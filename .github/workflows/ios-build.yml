name: "iOS Build & Test"

on:
  push:
    branches: ["main", "ux/**"]
  pull_request:
    branches: ["main", "ux/**"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  ios_native:
    name: "Build & Test (ios-native / BuchstabenNativeTests)"
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Test (iOS Simulator)
        id: test
        run: |
          xcodebuild test \
            -project BuchstabenApp/BuchstabenApp.xcodeproj \
            -scheme BuchstabenApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/test.log
          echo "test_status=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Extract failure summary
        id: failure
        if: failure()
        run: |
          ERRORS=$(grep -E "error:|XCTAssert.*failed|Test.*failed|FAILED" /tmp/test.log 2>/dev/null \
            | grep -v "^Binary" | head -15 || echo "See run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")
          printf '%s' "$ERRORS" > /tmp/ci_errors.txt

      - name: Inject priority task into council queue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CI_ERRORS=$(cat /tmp/ci_errors.txt 2>/dev/null || echo "unknown")
          TASK="[P1-ci-fix] Fix CI failure on ${{ github.ref_name }}: $(echo "$CI_ERRORS" | head -3 | tr '\n' ' ') — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          QUEUE_FILE="task-queue.md"
          if [ -f "$QUEUE_FILE" ]; then
            python3 - "$QUEUE_FILE" "$TASK" << 'PY'
          import sys
          path, task = sys.argv[1], sys.argv[2]
          with open(path) as f: lines = f.readlines()
          out = []
          for l in lines:
              out.append(l)
              if l.strip() == '## Pending':
                  out.append(f'- [ios] {task}\n')
          with open(path, 'w') as f: f.writelines(out)
          PY
            git config user.email "ci@github-actions" && git config user.name "GitHub Actions"
            git add task-queue.md && git commit -m "ci: inject P1 fix task for failing build" && git push
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: ios-native-test-artifacts
          if-no-files-found: warn
          path: /tmp/test.log
