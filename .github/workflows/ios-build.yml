name: "iOS Build & Test"

on:
  push:
    branches: ["main", "ux/**"]
  pull_request:
    branches: ["main", "ux/**"]
  workflow_dispatch:

jobs:
  build:
    name: Build (legacy ios-build/Timestretch)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: xcodebuild -project ios-build/Timestretch/Timestretch.xcodeproj -scheme Timestretch -destination 'generic/platform=iOS' -configuration Debug CODE_SIGNING_ALLOWED=NO build

      - name: Test (if supported by scheme)
        run: |
          if xcodebuild -project ios-build/Timestretch/Timestretch.xcodeproj -scheme Timestretch -showBuildSettings 2>/dev/null | grep -q TEST_HOST; then
            xcodebuild -project ios-build/Timestretch/Timestretch.xcodeproj -scheme Timestretch -destination 'generic/platform=iOS' -configuration Debug CODE_SIGNING_ALLOWED=NO test
          else
            echo "No test action configured for scheme Timestretch; skipping tests."
          fi

  ios_native:
    name: "Build & Test (ios-native / BuchstabenNativeTests)"
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ios-native validation lane
        run: |
          IOS_NATIVE_ARTIFACT_DIR="$GITHUB_WORKSPACE/ios-native-ci-artifacts" \
          ./scripts/ios-native-gate.sh --strict

      - name: Upload ios-native test artifacts
        if: always() && steps.scheme.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-native-test-artifacts
          if-no-files-found: warn
          path: |
            ${{ github.workspace }}/ios-native-ci-artifacts/*.log
            ${{ github.workspace }}/ios-native-ci-artifacts/*.xcresult
