name: "iOS Build & Test"

on:
  push:
    branches: ["main", "ux/**"]
  pull_request:
    branches: ["main", "ux/**"]
  workflow_dispatch:

jobs:
  build:
    name: Build (legacy ios-build/Timestretch)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: xcodebuild -project ios-build/Timestretch/Timestretch.xcodeproj -scheme Timestretch -destination 'generic/platform=iOS' -configuration Debug CODE_SIGNING_ALLOWED=NO build

      - name: Test (if supported by scheme)
        run: |
          if xcodebuild -project ios-build/Timestretch/Timestretch.xcodeproj -scheme Timestretch -showBuildSettings 2>/dev/null | grep -q TEST_HOST; then
            xcodebuild -project ios-build/Timestretch/Timestretch.xcodeproj -scheme Timestretch -destination 'generic/platform=iOS' -configuration Debug CODE_SIGNING_ALLOWED=NO test
          else
            echo "No test action configured for scheme Timestretch; skipping tests."
          fi

  ios_native:
    name: "Build & Test (ios-native / BuchstabenNativeTests)"
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve package and discover scheme
        id: scheme
        run: |
          xcodebuild -list -json > /tmp/spm_schemes.json
          cat /tmp/spm_schemes.json
          SCHEME=$(python3 - << 'PY'
          import json
          obj=json.load(open('/tmp/spm_schemes.json'))
          scopes=[obj.get('workspace',{}), obj.get('project',{})]
          for scope in scopes:
              for s in scope.get('schemes',[]):
                  if 'BuchstabenNative' in s:
                      print(s)
                      raise SystemExit
          PY
          )
          if [ -z "$SCHEME" ]; then
            echo "No BuchstabenNative scheme found; skipping ios_native build/test"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          fi

      - name: Build ios-native
        if: steps.scheme.outputs.skip != 'true'
        run: |
          set -o pipefail
          mkdir -p "$GITHUB_WORKSPACE/ios-native-ci-artifacts"
          xcodebuild \
            -scheme "${{ steps.scheme.outputs.scheme }}" \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build | tee "$GITHUB_WORKSPACE/ios-native-ci-artifacts/build.log"

      - name: Test BuchstabenNativeTests
        if: steps.scheme.outputs.skip != 'true'
        run: |
          set -o pipefail
          mkdir -p "$GITHUB_WORKSPACE/ios-native-ci-artifacts"
          xcodebuild \
            -scheme "${{ steps.scheme.outputs.scheme }}" \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            -resultBundlePath "$GITHUB_WORKSPACE/ios-native-ci-artifacts/BuchstabenNativeTests.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            test | tee "$GITHUB_WORKSPACE/ios-native-ci-artifacts/test.log"

      - name: Upload ios-native test artifacts
        if: always() && steps.scheme.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-native-test-artifacts
          if-no-files-found: warn
          path: |
            ${{ github.workspace }}/ios-native-ci-artifacts/*.log
            ${{ github.workspace }}/ios-native-ci-artifacts/*.xcresult
