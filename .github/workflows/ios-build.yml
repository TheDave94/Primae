name: "iOS Build & Test"

on:
  push:
    branches: ["main", "ux/**"]
  pull_request:
    branches: ["main", "ux/**"]
  workflow_dispatch:

jobs:
  ios_native:
    name: "Build & Test (ios-native / BuchstabenNativeTests)"
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve package and discover scheme
        id: scheme
        run: |
          xcodebuild -list -json > /tmp/spm_schemes.json
          cat /tmp/spm_schemes.json
          SCHEME=$(python3 - << 'PY'
          import json
          obj=json.load(open('/tmp/spm_schemes.json'))
          scopes=[obj.get('workspace',{}), obj.get('project',{})]
          for scope in scopes:
              for s in scope.get('schemes',[]):
                  if 'BuchstabenNative' in s:
                      print(s)
                      raise SystemExit
          PY
          )
          if [ -z "$SCHEME" ]; then
            echo "No BuchstabenNative scheme found; skipping ios_native build/test"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          fi

      - name: Build ios-native
        if: steps.scheme.outputs.skip != 'true'
        run: |
          xcodebuild \
            -scheme "${{ steps.scheme.outputs.scheme }}" \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test BuchstabenNativeTests
        if: steps.scheme.outputs.skip != 'true'
        run: |
          xcodebuild \
            -scheme "${{ steps.scheme.outputs.scheme }}" \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            test
