name: iOS Build

on:
  push:
    branches:
      - ux/smoother-ui-experiments
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build (iOS Simulator)
        run: |
          xcodebuild \
            -project ios-build/Timestretch/Timestretch/Timestretch.xcodeproj \
            -scheme Timestretch \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPad Pro (12.9-inch) (6th generation)' \
            CODE_SIGNING_ALLOWED=NO \
            build
