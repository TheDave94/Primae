name: "iOS Build & Test"
on:
  push:
    branches: ["main", "ux/**"]
  pull_request:
    branches: ["main", "ux/**"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Xcode build & test on GitHub-hosted macOS 15 ──────────────────
  # Primary gate. iPad (10th generation) confirmed on macos-15/iOS 18.4.
  # Xcode 16.4 default — no xcode-select override needed.
  xcode_test:
    name: "Build & Test — iPad Simulator (macos-15 / Xcode 16.4)"
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache Xcode SPM dependencies
        uses: irgaly/xcode-cache@v1
        with:
          key: xcode-spm-${{ hashFiles('Package.resolved', 'BuchstabenApp/BuchstabenApp.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: xcode-spm-

      - name: Build & Test — iPad (10th generation)
        run: |
          set -o pipefail
          xcodebuild test \
            -project BuchstabenApp/BuchstabenApp.xcodeproj \
            -scheme BuchstabenApp \
            -destination 'platform=iOS Simulator,name=iPad (10th generation),OS=latest' \
            -configuration Debug \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath /tmp/TestResults.xcresult \
            2>&1 | tee /tmp/xcode-test.log

      - name: Extract failure summary
        if: failure()
        run: |
          ERRORS=$(grep -E "error:|#expect.*failed|XCTAssert.*failed|Test.*FAILED" \
            /tmp/xcode-test.log 2>/dev/null \
            | grep -v "^Binary" | head -15 \
            || echo "See run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")
          printf '%s' "$ERRORS" > /tmp/ci_errors.txt
          cat /tmp/ci_errors.txt

      - name: Inject priority task into council queue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CI_ERRORS=$(cat /tmp/ci_errors.txt 2>/dev/null || echo "unknown")
          TASK="[P1-ci-fix] Fix CI failure on ${{ github.ref_name }}: $(echo "$CI_ERRORS" | head -3 | tr '\n' ' ') — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          QUEUE_FILE="task-queue.md"
          if [ -f "$QUEUE_FILE" ]; then
            python3 - "$QUEUE_FILE" "$TASK" << 'PY'
          import sys
          path, task = sys.argv[1], sys.argv[2]
          with open(path) as f: lines = f.readlines()
          out = []
          for l in lines:
              out.append(l)
              if l.strip() == '## Pending':
                  out.append(f'- [ios] {task}\n')
          with open(path, 'w') as f: f.writelines(out)
          PY
            git config user.email "ci@github-actions"
            git config user.name "GitHub Actions"
            git add task-queue.md
            git commit -m "ci: inject P1 fix task for failing build"
            git push
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-test-results
          if-no-files-found: warn
          path: |
            /tmp/xcode-test.log
            /tmp/TestResults.xcresult

  # ── Job 2: Xcode 26 forward-compat build (non-blocking) ──────────────────
  # App Store requires Xcode 26 from April 2026. Non-blocking — tracks migration.
  xcode26_compat:
    name: "Xcode 26 Forward-Compat (non-blocking)"
    runs-on: macos-26
    needs: xcode_test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build check — Xcode 26
        run: |
          set -o pipefail
          xcodebuild build \
            -project BuchstabenApp/BuchstabenApp.xcodeproj \
            -scheme BuchstabenApp \
            -destination 'platform=iOS Simulator,name=iPad (10th generation),OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/xcode26-build.log

      - name: Upload Xcode 26 build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode26-build-log
          if-no-files-found: warn
          path: /tmp/xcode26-build.log

  # ── Job 3: Self-hosted MacBook — device-specific validation ──────────────
  # Only runs if xcode_test passes. Validates on your exact local setup.
  device_test:
    name: "Device Test (MacBook self-hosted)"
    runs-on: self-hosted
    needs: xcode_test
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: List available iPad simulators
        run: xcrun simctl list devices available | grep -i ipad

      - name: Build & Test (local simulator)
        run: |
          set -o pipefail
          xcodebuild test \
            -project BuchstabenApp/BuchstabenApp.xcodeproj \
            -scheme BuchstabenApp \
            -destination 'platform=iOS Simulator,name=iPad (10th generation)' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/test-device.log

      - name: Upload device test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-device-test-log
          if-no-files-found: warn
          path: /tmp/test-device.log
