name: iOS Build

on:
  push:
    branches:
      - ux/smoother-ui-experiments
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build (iOS Simulator)
        run: |
          xcodebuild \n            -project ios-build/Timestretch/Timestretch/Timestretch.xcodeproj \n            -scheme Timestretch \n            -configuration Debug \n            -destination "platform=iOS Simulator,name=iPad Pro (12.9-inch) (6th generation)" \n            CODE_SIGNING_ALLOWED=NO \n            build
