name: iOS Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (iOS Device — arm64)
    runs-on: macos-15

    env:
      SCHEME:          Timestretch
      PROJECT:         Timestretch.xcodeproj
      DESTINATION:     "generic/platform=iOS"
      DERIVED_DATA:    ${{ github.workspace }}/DerivedData
      VCPKG_LIB:       ${{ github.workspace }}/ios-build/vcpkg/installed/arm64-ios/lib
      SDL_FRAMEWORK:   ${{ github.workspace }}/ios-build/SDL3.xcframework
      XCODE_PROJECT:   ${{ github.workspace }}/ios-build/Timestretch

    steps:

    # ── 1. Checkout ──────────────────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # ── 2. Environment info ──────────────────────────────────────────────────
    - name: Show Xcode + SDK versions
      run: |
        xcodebuild -version
        xcodebuild -showsdks | grep -i ios

    # ── 3. Verify all required libraries are present ─────────────────────────
    # The pre-built arm64-ios static libs and SDL3.xcframework are committed
    # directly in the repo — no vcpkg build step needed.
    - name: Verify dependencies
      run: |
        LIBDIR="${{ env.VCPKG_LIB }}"
        REQUIRED=(
          librubberband.a libsndfile.a
          libfftw3.a libfftw3f.a libfftw3l.a
          libFLAC.a "libFLAC++.a"
          libmp3lame.a libmpg123.a
          libogg.a libopus.a libout123.a
          libsamplerate.a libsyn123.a
          libvorbis.a libvorbisenc.a libvorbisfile.a
        )
        missing=0
        for lib in "${REQUIRED[@]}"; do
          if [ -f "$LIBDIR/$lib" ]; then
            echo "✅  $lib"
          else
            echo "❌  MISSING: $LIBDIR/$lib"
            missing=$((missing+1))
          fi
        done
        if [ -d "${{ env.SDL_FRAMEWORK }}" ]; then
          echo "✅  SDL3.xcframework"
        else
          echo "❌  MISSING: SDL3.xcframework"
          missing=$((missing+1))
        fi
        if [ $missing -gt 0 ]; then
          echo ""
          echo "ERROR: $missing required dependencies are missing from the repo."
          exit 1
        fi

    # ── 4. Cache DerivedData ─────────────────────────────────────────────────
    - name: Cache DerivedData
      uses: actions/cache@v4
      with:
        path: ${{ env.DERIVED_DATA }}
        key: deriveddata-${{ runner.os }}-${{ hashFiles('ios-build/Timestretch/Timestretch.xcodeproj/project.pbxproj', 'ios-build/Timestretch/Timestretch/main.mm') }}
        restore-keys: |
          deriveddata-${{ runner.os }}-

    # ── 5. Install xcpretty ──────────────────────────────────────────────────
    - name: Install xcpretty
      run: gem install xcpretty --no-document

    # ── 6. Patch library symlinks for clean absolute paths ───────────────────
    # Xcode's <group>-relative path resolution can be fragile in CI.
    # Symlink the vcpkg libs and SDL3 framework into a known location that
    # matches the $(SRCROOT)/../ relative paths used in the pbxproj.
    - name: Verify resolved library paths
      run: |
        SRCROOT="${{ env.XCODE_PROJECT }}/Timestretch"
        echo "SRCROOT equivalent: $SRCROOT"
        echo "Resolved vcpkg lib path: $(cd "$SRCROOT/.." 2>/dev/null && pwd)/vcpkg/installed/arm64-ios/lib"
        ls "${{ env.VCPKG_LIB }}/libsndfile.a" && echo "✅ libsndfile.a reachable"
        ls "${{ env.VCPKG_LIB }}/librubberband.a" && echo "✅ librubberband.a reachable"
        ls "${{ env.SDL_FRAMEWORK }}" && echo "✅ SDL3.xcframework reachable"

    # ── 7. Build ─────────────────────────────────────────────────────────────
    - name: Build for iOS Device
      working-directory: ${{ env.XCODE_PROJECT }}
      run: |
        set -o pipefail
        mkdir -p "${{ github.workspace }}/test-results"
        # Tee raw output to a file so we capture full clang diagnostics,
        # then also pretty-print for the Actions log.
        xcodebuild \
          -project         "${{ env.PROJECT }}" \
          -scheme          "${{ env.SCHEME }}" \
          -destination     "${{ env.DESTINATION }}" \
          -configuration   Debug \
          -derivedDataPath "${{ env.DERIVED_DATA }}" \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          ONLY_ACTIVE_ARCH=NO \
          LIBRARY_SEARCH_PATHS="$(inherited) ${{ env.VCPKG_LIB }}" \
          FRAMEWORK_SEARCH_PATHS="$(inherited) ${{ github.workspace }}/ios-build" \
          HEADER_SEARCH_PATHS="$(inherited) ${{ github.workspace }}/ios-build/vcpkg/installed/arm64-ios/include" \
          build 2>&1 | tee "${{ github.workspace }}/test-results/xcodebuild-raw.log" \
        | xcpretty --color --report junit \
            --output "${{ github.workspace }}/test-results/build.xml" || \
        { echo ""; echo "=== RAW COMPILER ERRORS ==="; \
          grep -E "error:|warning:|note:" "${{ github.workspace }}/test-results/xcodebuild-raw.log" | head -50; \
          exit 1; }

    # ── 7. Upload build logs ─────────────────────────────────────────────────
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ github.run_number }}
        path: |
          ${{ github.workspace }}/test-results/
          ${{ env.DERIVED_DATA }}/Logs/
        retention-days: 14

    # ── 8. Package .app ──────────────────────────────────────────────────────
    - name: Package .app artifact
      if: success()
      run: |
        APP=$(find "${{ env.DERIVED_DATA }}" -name "Timestretch.app" -type d | head -1)
        if [ -n "$APP" ]; then
          echo "APP_PATH=$APP" >> $GITHUB_ENV
          zip -r "${{ github.workspace }}/Timestretch-iOS.zip" "$APP"
          echo "✅  Packaged: $APP"
        else
          echo "⚠️  .app not found — skipping"
        fi

    - name: Upload simulator .app
      if: success() && env.APP_PATH != ''
      uses: actions/upload-artifact@v4
      with:
        name: Timestretch-iOS-${{ github.run_number }}
        path: Timestretch-iOS.zip
        retention-days: 14

    # ── 9. Summary ───────────────────────────────────────────────────────────
    - name: Build summary
      if: always()
      run: |
        echo "## iOS Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|---|---|" >> $GITHUB_STEP_SUMMARY
        echo "| Scheme | ${{ env.SCHEME }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Destination | ${{ env.DESTINATION }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Run | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
