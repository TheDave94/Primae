<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="-apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
    <linearGradient id="fade1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="fade2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="fade3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="600" fill="#111">Three-Phase Pedagogical Arc — Gradual Release of Responsibility</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#666">Pearson &amp; Gallagher (1983) · per letter, scaffolding withdrawn step by step</text>

  <!-- Phase 1: Observe -->
  <rect x="40" y="100" width="240" height="180" rx="14" fill="url(#fade1)" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="160" y="135" text-anchor="middle" font-size="18" font-weight="700" fill="white">1 · Beobachten</text>
  <text x="160" y="155" text-anchor="middle" font-size="12" fill="white" opacity="0.9">observe</text>
  <!-- mini A illustration -->
  <g transform="translate(160 200)">
    <line x1="-30" y1="35" x2="0" y2="-30" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <line x1="30" y1="35" x2="0" y2="-30" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <line x1="-18" y1="10" x2="18" y2="10" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <circle cx="-22" cy="20" r="5" fill="#fb923c"/>
  </g>
  <text x="160" y="262" text-anchor="middle" font-size="11" fill="white" opacity="0.95">Animation traces letter</text>
  <text x="160" y="276" text-anchor="middle" font-size="11" fill="white" opacity="0.95">Touch disabled · child watches</text>

  <!-- Arrow 1 -->
  <line x1="285" y1="190" x2="325" y2="190" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 2: Guided -->
  <rect x="330" y="100" width="240" height="180" rx="14" fill="url(#fade2)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="450" y="135" text-anchor="middle" font-size="18" font-weight="700" fill="white">2 · Geführt</text>
  <text x="450" y="155" text-anchor="middle" font-size="12" fill="white" opacity="0.9">guided</text>
  <g transform="translate(450 200)">
    <line x1="-30" y1="35" x2="0" y2="-30" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <line x1="30" y1="35" x2="0" y2="-30" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <line x1="-18" y1="10" x2="18" y2="10" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <line x1="-30" y1="35" x2="-10" y2="0" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <circle cx="-30" cy="35" r="4" fill="white"/>
    <circle cx="-20" cy="22" r="4" fill="white"/>
    <circle cx="-10" cy="0" r="4" fill="white"/>
    <circle cx="0" cy="-30" r="4" fill="white" opacity="0.5"/>
  </g>
  <text x="450" y="262" text-anchor="middle" font-size="11" fill="white" opacity="0.95">Child traces with checkpoints</text>
  <text x="450" y="276" text-anchor="middle" font-size="11" fill="white" opacity="0.95">Order enforced · audio reacts</text>

  <!-- Arrow 2 -->
  <line x1="575" y1="190" x2="615" y2="190" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 3: Free Write -->
  <rect x="620" y="100" width="240" height="180" rx="14" fill="url(#fade3)" stroke="#7e22ce" stroke-width="1.5"/>
  <text x="740" y="135" text-anchor="middle" font-size="18" font-weight="700" fill="white">3 · Frei schreiben</text>
  <text x="740" y="155" text-anchor="middle" font-size="12" fill="white" opacity="0.9">freeWrite</text>
  <g transform="translate(740 200)">
    <path d="M -28 35 Q -10 -5 0 -28 Q 12 -5 28 35 M -16 8 Q 0 6 16 8" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
  <text x="740" y="262" text-anchor="middle" font-size="11" fill="white" opacity="0.95">Scaffold withdrawn</text>
  <text x="740" y="276" text-anchor="middle" font-size="11" fill="white" opacity="0.95">Fréchet-distance scoring</text>

  <!-- bottom legend -->
  <text x="450" y="320" text-anchor="middle" font-size="13" fill="#333" font-weight="500">Each phase advances on completion, not on time. Stars awarded after the full arc.</text>
  <text x="450" y="340" text-anchor="middle" font-size="11" fill="#888" font-style="italic">A/B/C study compares the full arc · guided-only · single-phase control</text>
</svg>
