<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="-apple-system, BlinkMacSystemFont, sans-serif">
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="600" fill="#111">A/B/C Study Design — Three Conditions</text>
  <text x="450" y="55" text-anchor="middle" font-size="13" fill="#666">Random uniform assignment at first launch · participantId UUID · condition recorded with every session</text>

  <!-- Condition headers -->
  <rect x="40"  y="90" width="260" height="46" rx="8" fill="#7e22ce"/>
  <rect x="320" y="90" width="260" height="46" rx="8" fill="#0d9488"/>
  <rect x="600" y="90" width="260" height="46" rx="8" fill="#64748b"/>

  <text x="170" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="white">.threePhase</text>
  <text x="450" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="white">.guidedOnly</text>
  <text x="730" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="white">.control</text>

  <!-- threePhase column -->
  <rect x="40" y="146" width="260" height="220" rx="8" fill="#faf5ff" stroke="#a855f7" stroke-width="1"/>
  <text x="60" y="170" font-size="12" fill="#666">Phases shown</text>
  <text x="60" y="192" font-size="13" font-weight="600" fill="#111">observe → guided → freeWrite</text>
  <text x="60" y="220" font-size="12" fill="#666">Difficulty</text>
  <text x="60" y="240" font-size="13" font-weight="600" fill="#111">adaptive (3 tiers)</text>
  <text x="60" y="268" font-size="12" fill="#666">Hypothesised role</text>
  <text x="60" y="288" font-size="13" font-weight="600" fill="#111">full GRRM arm</text>
  <text x="60" y="316" font-size="12" fill="#666">Implementation</text>
  <text x="60" y="336" font-size="11" fill="#444" font-family="monospace">LearningPhaseController</text>
  <text x="60" y="354" font-size="11" fill="#444" font-family="monospace">+ MovingAverageAdaptation</text>

  <!-- guidedOnly column -->
  <rect x="320" y="146" width="260" height="220" rx="8" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1"/>
  <text x="340" y="170" font-size="12" fill="#666">Phases shown</text>
  <text x="340" y="192" font-size="13" font-weight="600" fill="#111">guided only</text>
  <text x="340" y="220" font-size="12" fill="#666">Difficulty</text>
  <text x="340" y="240" font-size="13" font-weight="600" fill="#111">adaptive (3 tiers)</text>
  <text x="340" y="268" font-size="12" fill="#666">Hypothesised role</text>
  <text x="340" y="288" font-size="13" font-weight="600" fill="#111">partial-scaffold arm</text>
  <text x="340" y="316" font-size="12" fill="#666">Implementation</text>
  <text x="340" y="336" font-size="11" fill="#444" font-family="monospace">LearningPhaseController</text>
  <text x="340" y="354" font-size="11" fill="#444" font-family="monospace">  (starts at .guided)</text>

  <!-- control column -->
  <rect x="600" y="146" width="260" height="220" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
  <text x="620" y="170" font-size="12" fill="#666">Phases shown</text>
  <text x="620" y="192" font-size="13" font-weight="600" fill="#111">guided only</text>
  <text x="620" y="220" font-size="12" fill="#666">Difficulty</text>
  <text x="620" y="240" font-size="13" font-weight="600" fill="#111">FIXED .standard</text>
  <text x="620" y="268" font-size="12" fill="#666">Hypothesised role</text>
  <text x="620" y="288" font-size="13" font-weight="600" fill="#111">minimal-treatment baseline</text>
  <text x="620" y="316" font-size="12" fill="#666">Implementation</text>
  <text x="620" y="336" font-size="11" fill="#444" font-family="monospace">LearningPhaseController</text>
  <text x="620" y="354" font-size="11" fill="#444" font-family="monospace">+ FixedAdaptation(.standard)</text>

  <!-- Footer -->
  <text x="450" y="395" text-anchor="middle" font-size="12" fill="#444"><tspan font-weight="600">Random source:</tspan> Apple SecRandomCopyBytes (UUIDv4 byte 0 mod 3) · uniformity verified via 3,000-sample test</text>
</svg>
