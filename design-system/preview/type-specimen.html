<!doctype html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font-text)}
.w{padding:22px 26px;display:flex;gap:24px;align-items:center}
.col{flex:1;display:flex;flex-direction:column;gap:6px}
.h{font-family:var(--font-mono);font-size:11px;color:var(--ink-soft)}
.glyph{font-size:160px;line-height:1;color:var(--ink)}
.lab{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:700;margin-bottom:6px}
</style></head><body><div class="w">
<div class="col">
  <div class="lab">Druckschrift · Primae (→ Nunito)</div>
  <div class="glyph" style="font-family:var(--font-display);font-weight:700">A a</div>
  <div class="h">font-display · used for the traceable glyph + UI</div>
</div>
<div class="col">
  <div class="lab">Schreibschrift · Playwrite AT</div>
  <div class="glyph t-cursive">A a</div>
  <div class="h">font-cursive · Austrian school cursive (SIL OFL)</div>
</div>
</div></body></html>
