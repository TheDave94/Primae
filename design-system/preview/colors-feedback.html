<!doctype html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--paper);font-family:var(--font-text)}
.w{padding:22px 26px;display:flex;flex-direction:column;gap:14px}
.r{display:flex;gap:12px}
.tile{flex:1;border:2px solid var(--ink);border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:6px}
.t{font-size:13px;font-weight:700}
.h{font-family:var(--font-mono);font-size:11px}
.dot{width:18px;height:18px;border-radius:50%}
.lab{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
</style></head><body><div class="w">
<div class="lab">Feedback semantics</div>
<div class="r">
  <div class="tile" style="background:var(--success-soft);border-color:var(--success)"><div class="dot" style="background:var(--success)"></div><div class="t" style="color:var(--success)">Success</div><div class="h">--success #3FA060</div></div>
  <div class="tile" style="background:var(--warning-soft);border-color:var(--warning)"><div class="dot" style="background:var(--warning)"></div><div class="t" style="color:#7a5410">Warning</div><div class="h">--warning #E0A234</div></div>
  <div class="tile" style="background:var(--danger-soft);border-color:var(--danger)"><div class="dot" style="background:var(--danger)"></div><div class="t" style="color:var(--danger)">Danger</div><div class="h">--danger #C24A2C</div></div>
  <div class="tile" style="background:var(--info-soft);border-color:var(--info)"><div class="dot" style="background:var(--info)"></div><div class="t" style="color:var(--info)">Info</div><div class="h">--info #4A86C7</div></div>
</div>
</div></body></html>
