<!doctype html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--paper);font-family:var(--font-text);color:var(--ink)}
.w{padding:22px 26px;display:flex;flex-direction:column;gap:14px}
.lab{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 20px;font-family:var(--font-display, "Nunito");font-weight:700;font-size:15px;border:2px solid var(--ink);border-radius:999px;box-shadow:0 4px 0 var(--ink);cursor:pointer;transition:transform .14s, box-shadow .14s}
.btn:active{transform:translate(2px,3px);box-shadow:0 0 0 var(--ink)}
.btn--brand{background:var(--brand);color:var(--paper)}
.btn--schule{background:var(--schule);color:var(--paper)}
.btn--werkstatt{background:var(--werkstatt);color:var(--ink)}
.btn--secondary{background:var(--paper);color:var(--ink);box-shadow:0 4px 0 var(--paper-edge)}
.note{font-family:var(--font-mono);font-size:11px;color:var(--ink-soft)}
</style></head><body><div class="w">
<div class="lab">Sticker buttons — primary CTAs (kid-facing)</div>
<div class="row">
  <button class="btn btn--brand">✓ Fertig</button>
  <button class="btn btn--schule">→ Weiter</button>
  <button class="btn btn--werkstatt">↻ Neu</button>
  <button class="btn btn--secondary">Abbrechen</button>
</div>
<div class="note">2 px ink border · `0 4px 0` ink shadow → collapses to flush on press</div>
</div></body></html>
