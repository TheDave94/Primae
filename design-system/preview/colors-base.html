<!doctype html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--paper);font-family:var(--font-text)}
.w{padding:22px 26px;display:flex;flex-direction:column;gap:14px}
.r{display:flex;gap:12px;flex-wrap:wrap}
.s{display:flex;flex-direction:column;gap:5px;width:96px}
.c{height:54px;border-radius:12px;border:2px solid var(--ink)}
.n{font-size:13px;font-weight:600;color:var(--ink);font-family:var(--font-mono)}
.h{font-size:11px;color:var(--ink-soft);font-family:var(--font-mono)}
.lab{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
</style></head><body><div class="w">
<div class="lab">Paper & Ink — base surfaces</div>
<div class="r">
  <div class="s"><div class="c" style="background:var(--paper)"></div><span class="n">paper</span><span class="h">#FDF8EE</span></div>
  <div class="s"><div class="c" style="background:var(--paper-deep)"></div><span class="n">paper-deep</span><span class="h">#F6EFDD</span></div>
  <div class="s"><div class="c" style="background:var(--paper-edge)"></div><span class="n">paper-edge</span><span class="h">#ECE2C8</span></div>
  <div class="s"><div class="c" style="background:var(--canvas-paper)"></div><span class="n">canvas</span><span class="h">#FFFCF4</span></div>
  <div class="s"><div class="c" style="background:var(--ink)"></div><span class="n" style="color:var(--ink)">ink</span><span class="h">#2A241A</span></div>
  <div class="s"><div class="c" style="background:var(--ink-soft)"></div><span class="n">ink-soft</span><span class="h">#5C513F</span></div>
  <div class="s"><div class="c" style="background:var(--ink-faint)"></div><span class="n">ink-faint</span><span class="h">#A89C82</span></div>
  <div class="s"><div class="c" style="background:var(--ink-ghost)"></div><span class="n">ink-ghost</span><span class="h">#D9CFB3</span></div>
</div>
</div></body></html>
