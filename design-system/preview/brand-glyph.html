<!doctype html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--paper);font-family:var(--font-text);color:var(--ink)}
.w{padding:22px 26px;display:flex;align-items:center;gap:18px}
.brand{width:80px;height:80px;display:grid;place-items:center;background:var(--paper);border:3px solid var(--ink);border-radius:18px;box-shadow:0 4px 0 var(--ink)}
.meta{display:flex;flex-direction:column;gap:4px}
.name{font-family:"Nunito",system-ui;font-weight:800;font-size:24px}
.tag{font-size:13px;color:var(--ink-soft)}
.note{font-family:var(--font-mono);font-size:11px;color:var(--ink-soft)}
</style></head><body><div class="w">
<div class="brand"><img src="../assets/app-glyph.svg" width="64" height="64" alt=""></div>
<div class="meta">
  <div class="name">Primae</div>
  <div class="tag">iPad · German alphabet learning</div>
  <div class="note">App glyph — 256×256 SVG · paper square · friendly italic 'a' character</div>
</div>
</div></body></html>
