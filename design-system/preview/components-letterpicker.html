<!doctype html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--paper);font-family:var(--font-text);color:var(--ink)}
.w{padding:22px 26px;display:flex;flex-direction:column;gap:12px}
.lab{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
.row{display:flex;gap:14px;align-items:center}
.cell{min-width:78px;padding:10px 12px;display:flex;flex-direction:column;align-items:center;gap:6px;background:var(--paper);border:2px solid var(--paper-edge);border-radius:14px}
.cell.is-active{background:var(--brand-soft);border-color:var(--brand)}
.glyph{font-family:"Nunito",system-ui;font-weight:800;font-size:30px;line-height:1}
.stars{display:inline-flex;gap:2px}
.stars svg{width:11px;height:11px}
.note{font-family:var(--font-mono);font-size:11px;color:var(--ink-soft)}
</style></head><body><div class="w">
<div class="lab">Letter picker cells</div>
<div class="row">
  <div class="cell is-active"><div class="glyph">A</div>

      <svg viewBox="0 0 24 24"><path d="M12 2L14.6 8.6 21.6 9.2 16.2 13.8 17.8 20.6 12 17 6.2 20.6 7.8 13.8 2.4 9.2 9.4 8.6Z" fill="#F6EFDD" stroke="#2A241A" stroke-width="1.6"/></svg>
    </div></div>
  <div class="cell"><div class="glyph">F</div>

</div></body></html>
