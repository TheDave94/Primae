<!doctype html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--paper);font-family:var(--font-text)}
.w{padding:22px 26px;display:flex;flex-direction:column;gap:16px}
.r{display:flex;gap:12px;align-items:flex-start}
.tile{flex:1;border:3px solid var(--ink);border-radius:18px;padding:14px;display:flex;flex-direction:column;gap:8px}
.hd{display:flex;align-items:center;gap:8px}
.dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--ink)}
.t{font-weight:700;font-size:15px}
.h{font-family:var(--font-mono);font-size:11px;color:var(--ink-soft)}
.bar{height:8px;border-radius:4px}
.lab{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
</style></head><body><div class="w">
<div class="lab">World tints — three top-level worlds</div>
<div class="r">
  <div class="tile" style="background:var(--schule-soft)">
    <div class="hd"><div class="dot" style="background:var(--schule)"></div><div class="t">Schule</div></div>
    <div class="h">#4A86C7 / #DCE9F5</div>
    <div class="bar" style="background:var(--schule)"></div>
  </div>
  <div class="tile" style="background:var(--werkstatt-soft)">
    <div class="hd"><div class="dot" style="background:var(--werkstatt)"></div><div class="t">Werkstatt</div></div>
    <div class="h">#E0A234 / #F8EBCC</div>
    <div class="bar" style="background:var(--werkstatt)"></div>
  </div>
  <div class="tile" style="background:var(--fortschritte-soft)">
    <div class="hd"><div class="dot" style="background:var(--fortschritte)"></div><div class="t">Fortschritte</div></div>
    <div class="h">#C24A2C / #F5D8CC</div>
    <div class="bar" style="background:var(--fortschritte)"></div>
  </div>
</div>
</div></body></html>
