<!doctype html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font-text)}
.w{padding:22px 26px;display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}
.r{width:90px;height:62px;background:var(--paper-deep);border:2px solid var(--ink)}
.unit{display:flex;flex-direction:column;align-items:center;gap:6px}
.lbl{font-family:var(--font-mono);font-size:10px;color:var(--ink-soft);text-align:center}
.lab{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:700;width:100%}
</style></head><body><div class="w">
<div class="lab">Radii</div>
<div class="unit"><div class="r" style="border-radius:8px"></div><div class="lbl">r-sm<br>8</div></div>
<div class="unit"><div class="r" style="border-radius:14px"></div><div class="lbl">r-md<br>14</div></div>
<div class="unit"><div class="r" style="border-radius:20px"></div><div class="lbl">r-lg<br>20</div></div>
<div class="unit"><div class="r" style="border-radius:28px"></div><div class="lbl">r-xl<br>28</div></div>
<div class="unit"><div class="r" style="border-radius:40px"></div><div class="lbl">r-2xl<br>40</div></div>
<div class="unit"><div class="r" style="border-radius:9999px"></div><div class="lbl">pill</div></div>
</div></body></html>
