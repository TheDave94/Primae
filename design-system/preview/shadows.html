<!doctype html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font-text)}
.w{padding:22px 26px;display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap}
.tile{width:130px;height:80px;background:var(--paper);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ink-soft);font-family:var(--font-mono)}
.unit{display:flex;flex-direction:column;align-items:center;gap:6px}
.lbl{font-size:11px;color:var(--ink-soft);font-weight:600}
.lab{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:700;width:100%}
</style></head><body><div class="w">
<div class="lab">Shadow / elevation system</div>
<div class="unit"><div class="tile" style="box-shadow:var(--sh-1)">sh-1</div><div class="lbl">resting card</div></div>
<div class="unit"><div class="tile" style="box-shadow:var(--sh-2)">sh-2</div><div class="lbl">raised</div></div>
<div class="unit"><div class="tile" style="box-shadow:var(--sh-3)">sh-3</div><div class="lbl">overlay / popup</div></div>
<div class="unit"><div class="tile" style="background:#C24A2C;color:#FFF;box-shadow:var(--sh-sticker)">sticker</div><div class="lbl">kid button</div></div>
<div class="unit"><div class="tile" style="background:#C24A2C;color:#FFF;box-shadow:var(--sh-press);transform:translateY(3px)">pressed</div><div class="lbl">pressed state</div></div>
</div></body></html>
