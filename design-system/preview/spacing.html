<!doctype html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font-text)}
.w{padding:22px 26px;display:flex;flex-direction:column;gap:14px}
.row{display:flex;gap:14px;align-items:flex-end}
.b{background:var(--ink);border-radius:4px}
.lbl{font-family:var(--font-mono);font-size:10px;color:var(--ink-soft);margin-top:6px;text-align:center}
.lab{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
.unit{display:flex;flex-direction:column;align-items:center}
</style></head><body><div class="w">
<div class="lab">Spacing — 4 px base · 8 px primary rhythm</div>
<div class="row">
  <div class="unit"><div class="b" style="width:4px;height:24px"></div><div class="lbl">sp-1<br>4</div></div>
  <div class="unit"><div class="b" style="width:8px;height:32px"></div><div class="lbl">sp-2<br>8</div></div>
  <div class="unit"><div class="b" style="width:12px;height:40px"></div><div class="lbl">sp-3<br>12</div></div>
  <div class="unit"><div class="b" style="width:16px;height:48px"></div><div class="lbl">sp-4<br>16</div></div>
  <div class="unit"><div class="b" style="width:24px;height:60px"></div><div class="lbl">sp-5<br>24</div></div>
  <div class="unit"><div class="b" style="width:32px;height:72px"></div><div class="lbl">sp-6<br>32</div></div>
  <div class="unit"><div class="b" style="width:48px;height:84px"></div><div class="lbl">sp-7<br>48</div></div>
  <div class="unit"><div class="b" style="width:64px;height:96px"></div><div class="lbl">sp-8<br>64</div></div>
</div>
</div></body></html>
