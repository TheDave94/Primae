# IOS_ROADMAP.yaml — Buchstaben-Lernen-App
# Goal-driven task file for autocoder council pipeline.
# Each item is scoped to 1-3 files, with concrete acceptance criteria.
#
# CRITICAL CONSTRAINTS (apply to ALL items):
# - Does NOT modify AudioEngine.swift — it is stable and fragile
# - Does NOT introduce new dependencies or frameworks
# - Must compile without warnings under Swift 6.3 strict concurrency
# - Must pass CI on macos-26 runner with Xcode 26.4
# - Test target uses .swiftLanguageMode(.v5) — do not change this
# - Main target uses .defaultIsolation(MainActor.self) — all types are implicitly @MainActor

- id: ios-001
  title: "Fix stroke tracker coordinate mismatch with Canvas render size"
  description: |
    The StrokeTracker receives checkpoint coordinates pre-mapped using vm.canvasSize
    (set to 1024x1024 at init, then updated via didSet). But touch input is normalized
    by the actual canvas size passed to updateTouch(). If canvasSize differs from the
    Canvas GeometryReader size at any point, isNearStroke returns false and audio never
    plays. The fix: reloadStrokeCheckpoints should also be called from inside the Canvas
    render closure (or the canvasSize didSet must guarantee it fires before any touch),
    and the mapping must use the same size as normalizeTouch.
  acceptance_criteria:
    - "In TracingViewModel.swift, reloadStrokeCheckpoints(for:) is called whenever canvasSize changes via the existing didSet — verify this path produces correct normalized coordinates"
    - "In TracingViewModel.swift updateTouch(at:t:canvasSize:), the canvasSize parameter passed for normalization is the same value used in reloadStrokeCheckpoints"
    - "When tracing along calibrated stroke checkpoints on device, strokeTracker.isNearStroke becomes true within checkpointRadius * 3 distance"
    - "The green/red audio indicator dot in the top-right turns green during active tracing on the letter centerline"
    - "Does NOT modify AudioEngine.swift"
    - "Does NOT modify StrokeTracker.swift — only TracingViewModel.swift"
    - "Does NOT change the strokes.json coordinate format"
  target_files:
    - "TracingViewModel.swift"
  priority: 10
  status: pending

