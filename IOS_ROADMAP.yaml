# IOS_ROADMAP.yaml — Goal-driven task queue for the iOS autocoder
#
# Each item defines WHAT to build, HOW to validate it, and WHERE to change.
# The autocoder picks up "pending" items and the council evaluates proposals
# against the acceptance_criteria.
#
# Status values: pending, in_progress, done, deferred, blocked
# Priority: 1-10 (10 = highest)
#
# Usage:
#   - Add items here when you know what you want built
#   - The autocoder picks them up when the queue is empty
#   - When done, set status: done and commit
#   - Use "deferred" to pause an item

# ── Example items (uncomment and modify) ─────────────────────────────────────

