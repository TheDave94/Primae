# Proposal: Safe Shutdown After 20-Min Desk Absence
# ── automations.yaml addition ────────────────────────────────────────────────

- id: desk_absence_safe_shutdown
  alias: '[Power] Safe Shutdown After Desk Absence'
  triggers:
    - trigger: state
      entity_id: binary_sensor.desk_presence   # ← confirm entity id
      to: 'off'
      for:
        minutes: 20
  conditions:
    - condition: state
      entity_id: binary_sensor.is_anyone_at_home
      state: 'on'
    - condition: not
      conditions:
        - condition: state
          entity_id: input_select.room_mode
          state: Sleep
  actions:
    - action: script.notify_those_at_home
      data:
        title: "💤 Desk Shutdown in 60s"
        message: "No desk presence for 20 min. Return to cancel."
        category: appliance
    - wait_for_trigger:
        - trigger: state
          entity_id: binary_sensor.desk_presence
          to: 'on'
      timeout:
        seconds: 60
      continue_on_timeout: true
    - condition: template
      value_template: "{{ wait.trigger is none }}"
    - action: script.desk_safe_shutdown
  mode: single

