# ── AUTOMATIONS ───────────────────────────────────────────────────────────────

- id: energy_baseline_hourly_update
  alias: '[Energy] Baseline Anomaly Detector — Hourly Update'
  triggers:
    - trigger: time_pattern
      minutes: 2    # fire 2 min past the hour so utility_meter has updated
  conditions:
    - condition: state
      entity_id: input_boolean.energy_anomaly_detector_enabled
      state: 'on'
    - condition: template
      value_template: "{{ now().minute == 2 }}"
  actions:
    - action: script.energy_baseline_update
  mode: single

- id: energy_anomaly_daily_stats
  alias: '[Energy] Baseline Anomaly Detector — Daily Stats'
  triggers:
    - trigger: time
      at: '00:00:00'
  conditions:
    - condition: numeric_state
      entity_id: counter.energy_anomaly_alerts_today
      above: 0
  actions:
    - variables:
        alerts: "{{ states('counter.energy_anomaly_alerts_today') | int(0) }}"
    - action: script.notify_me_direct
      data:
        title: "📊 Energie-Anomalien heute"
        message: "{{ alerts }} Anomalie-Alarm(e) ausgelöst. Baselines prüfen?"
    - action: counter.reset
      target: { entity_id: counter.energy_anomaly_alerts_today }
  mode: single

