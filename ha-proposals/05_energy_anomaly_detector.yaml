# Proposal: Energy Baseline Anomaly Detector
# 4-week rolling per-hour-of-week kWh average, >30% deviation alert
# commit: bf8cb617
#
# ── DESIGN ───────────────────────────────────────────────────────────────────
#
# 168 buckets (7 days × 24 hours). Each bucket stores the rolling average kWh
# for that hour-of-week. Every hour, the actual kWh consumed is compared
# against the bucket for the current hour-of-week; if deviation > threshold,
# alert fires.
#
# Rolling average update: new_avg = old_avg * (n-1)/n + actual * 1/n
# where n = min(samples, 4) to give a 4-week rolling window.
# n is stored in a parallel sample-count bucket so the average converges
# correctly over the first 4 weeks.
#
# Storage: 168 averages + 168 sample counts = 336 values.
# HA has no native array store, so these are stored as a JSON blob in a
# single input_text entity (max 255 chars is too small — use a
# `var` custom component OR write to a file via `shell_command` + read back).
#
# PRACTICAL ALTERNATIVE (no custom component):
# Use AppDaemon or a Python script run via shell_command. BUT since the
# constraint is pure HA YAML, we use a recorder + template sensor approach:
# store the 336 floats as a compressed CSV in two input_text entities
# (168 chars each, values rounded to 2dp, comma-separated).
# At 6 chars/value avg (e.g. "2.34,") × 168 = ~1000 chars — too long for
# input_text (max 255).
#
# VIABLE PURE-YAML APPROACH:
# Reduce to 24 buckets (hour-of-day only, drop day-of-week granularity).
# 24 values at 6 chars each = ~144 chars — fits in one input_text.
# Day-of-week distinction is captured separately via "weekday vs weekend"
# toggle, giving effectively 48 buckets with 2 input_text entities.
#
# This trades some accuracy for zero custom-component dependency.
# For full 168-bucket support, AppDaemon is recommended (noted below).
#
# ── HELPER ENTITIES ──────────────────────────────────────────────────────────

