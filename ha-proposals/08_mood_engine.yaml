# ── AUTOMATIONS ───────────────────────────────────────────────────────────────

- id: mood_engine_apply_on_change
  alias: '[Mood] Scene Engine — Apply on Mood Change'
  triggers:
    - trigger: state
      entity_id: input_select.room_mood
  conditions:
    - condition: state
      entity_id: binary_sensor.is_anyone_at_home
      state: 'on'
    - condition: not
      conditions:
        - condition: state
          entity_id: input_select.room_mode
          state: Sleep
  actions:
    - action: script.mood_apply
      data:
        mood: "{{ trigger.to_state.state }}"
  mode: single

- id: mood_engine_clear_on_sleep
  alias: '[Mood] Scene Engine — Clear on Sleep Mode'
  triggers:
    - trigger: state
      entity_id: input_select.room_mode
      to: Sleep
  conditions:
    - condition: not
      conditions:
        - condition: state
          entity_id: input_select.room_mood
          state: auto
  actions:
    - action: input_select.select_option
      target: { entity_id: input_select.room_mood }
      data: { option: auto }
  mode: single

- id: mood_engine_clear_on_away
  alias: '[Mood] Scene Engine — Clear on Away'
  triggers:
    - trigger: state
      entity_id: binary_sensor.is_anyone_at_home
      to: 'off'
  conditions:
    - condition: not
      conditions:
        - condition: state
          entity_id: input_select.room_mood
          state: auto
  actions:
    - action: input_select.select_option
      target: { entity_id: input_select.room_mood }
      data: { option: auto }
  mode: single

- id: mood_engine_auto_wind_down
  alias: '[Mood] Scene Engine — Auto Wind-Down at 21:00'
  triggers:
    - trigger: time
      at: '21:00:00'
  conditions:
    - condition: state
      entity_id: binary_sensor.is_anyone_at_home
      state: 'on'
    - condition: state
      entity_id: input_select.room_mood
      state: auto
    - condition: not
      conditions:
        - condition: state
          entity_id: input_select.room_mode
          state: Sleep
  actions:
    - action: input_select.select_option
      target: { entity_id: input_select.room_mood }
      data: { option: wind_down }
    - action: script.notify_me
      data:
        title: "🌅 Wind-Down Modus"
        message: "Automatisch aktiviert. Tippe um abzubrechen."
        data:
          actions:
            - action: MOOD_SET_AUTO
              title: "↩️ Auto"
  mode: single

- id: mood_engine_notification_action
  alias: '[Mood] Scene Engine — Notification Quick Actions'
  triggers:
    - trigger: event
      event_type: mobile_app_notification_action
      event_data: { action: MOOD_SET_AUTO }
  actions:
    - action: input_select.select_option
      target: { entity_id: input_select.room_mood }
      data: { option: auto }
  mode: single

- id: mood_engine_dnd_status_on_arrival
  alias: '[Mood] Scene Engine — Notify DND Active on Arrival'
  triggers:
    - trigger: state
      entity_id: binary_sensor.is_anyone_at_home
      to: 'on'
      for: { minutes: 1 }
  conditions:
    - condition: state
      entity_id: input_boolean.dnd_active
      state: 'on'
  actions:
    - action: script.notify_me_direct
      data:
        title: "🔕 DND aktiv"
        message: >
          Nicht stören ist aktiv (Modus: {{ states('input_select.room_mood') }}).
          Benachrichtigungen werden unterdrückt.
        data:
          actions:
            - action: MOOD_SET_AUTO
              title: "↩️ DND aufheben"
  mode: single
