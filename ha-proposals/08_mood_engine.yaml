# Proposal: Adaptive Scene & Mood Engine
# focus/wind-down/relax modes, DND gate, circadian integration
# commit: 7357d4b8
#
# ── DESIGN ───────────────────────────────────────────────────────────────────
#
# Three mood modes on top of (and integrated with) the circadian adaptive
# lighting pipeline (commit b276ae5c):
#
#   focus     → bright cool white (6000K/90%), notifications silenced (DND),
#               thermostat +0.5°C (alertness), adaptive lighting paused
#   wind_down → warm amber (2700K/35%), reduced notification verbosity,
#               thermostat -0.5°C, adaptive lighting paused
#   relax     → very warm dim (2200K/25%), DND on, thermostat -1°C,
#               adaptive lighting paused
#   auto      → hand back to circadian pipeline (clear overrides)
#
# Mood is stored in input_select.room_mood.
# DND gate: when mood is focus or relax, only critical notifications pass
#           through script.notify_me (checked via input_boolean.dnd_active).
# Circadian integration: setting a mood trips
#   input_boolean.adaptive_lighting_override_active so the circadian pipeline
#   steps back; clearing mood (→ auto) clears the override.
#
# ── HELPER ENTITIES ──────────────────────────────────────────────────────────
#
# input_select:
#   room_mood:
#     name: Room Mood
#     options: [auto, focus, wind_down, relax]
#     initial: auto
#     icon: mdi:creation
#
# input_boolean:
#   dnd_active:
#     name: Do Not Disturb Active
#     icon: mdi:bell-off
#   mood_thermostat_offset_applied:
#     name: Mood Thermostat Offset Applied
#
# input_number:
#   mood_thermostat_offset:
#     name: Mood Thermostat Offset (°C, can be negative)
#     min: -3
#     max: 3
#     step: 0.5
#     initial: 0
#     unit_of_measurement: "°C"
#
# input_text:
#   mood_baseline_setpoint:
#     name: Mood — Baseline Thermostat Setpoint Before Offset
#     max: 10

