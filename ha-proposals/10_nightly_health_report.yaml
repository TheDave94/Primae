# ── AUTOMATIONS ───────────────────────────────────────────────────────────────

- id: automation_health_report_nightly
  alias: '[System] Automation Health Report — Nightly'
  triggers:
    - trigger: time
      at: '23:30:00'
  conditions:
    - condition: state
      entity_id: binary_sensor.is_anyone_at_home
      state: 'on'
  actions:
    - action: script.automation_health_report
  mode: single

- id: automation_health_report_weekly_summary
  alias: '[System] Automation Health Report — Weekly Summary'
  triggers:
    - trigger: time
      at: '09:00:00'
  conditions:
    - condition: template
      value_template: "{{ now().weekday() == 0 }}"    # Monday
    - condition: numeric_state
      entity_id: counter.health_report_issues_this_week
      above: 0
  actions:
    - variables:
        nights_with_issues: "{{ states('counter.health_report_issues_this_week') | int(0) }}"
    - action: script.notify_me
      data:
        title: "📊 Wochen-Health-Report"
        message: >
          {{ nights_with_issues }}/7 Nächten mit Automations-Hinweisen diese Woche.
          {% if nights_with_issues >= 5 %}⚠️ Häufige Probleme — System prüfen.{% endif %}
    - action: counter.reset
      target: { entity_id: counter.health_report_issues_this_week }
  mode: single
