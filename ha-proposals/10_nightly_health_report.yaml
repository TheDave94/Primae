# Proposal: Nightly Automation Health Report
# Warnings for stuck states + overnight flag audit → notify_me
# commit: 6353301f
#
# ── DESIGN ───────────────────────────────────────────────────────────────────
#
# Every night at 23:30, a script audits the full automation ecosystem for
# anomalies and sends a single consolidated report (or stays silent if clean).
#
# Checks performed:
#   1. Stuck boolean flags — helper booleans that should not persist overnight
#   2. Disabled automations — any automation currently disabled (except known-intentional)
#   3. Active circuit breakers — input_boolean.circuit_breaker_active etc.
#   4. Active overrides — adaptive lighting, thermostat manual override, mood ≠ auto
#   5. Timers still running — leak timers, etc.
#   6. Valve shutoff active — water_valve_shutoff_active
#   7. DND still on overnight
#   8. Any input_text sentinel values indicating an unresolved incident
#
# Report format: single notification listing all findings.
# If zero findings → silent (no notification sent).
#
# ── HELPER ENTITIES ──────────────────────────────────────────────────────────
#
# No new helpers required — this proposal only reads existing entities.
# One new counter for tracking how many nights had issues:
#
# counter:
#   health_report_issues_this_week:
#     name: Health Report Issues This Week
#     initial: 0

