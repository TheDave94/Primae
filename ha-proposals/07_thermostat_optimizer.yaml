# Proposal: Adaptive Thermostat Schedule Optimizer
# Occupancy-based setpoint tuning, weekly summary notification
# commit: 6de4dca7
#
# ── DESIGN ───────────────────────────────────────────────────────────────────
#
# The thermostat (climate.room_david_vtherm) runs a fixed schedule today.
# This system learns actual occupancy patterns and nudges setpoints:
#
# 1. Track occupied/unoccupied transitions per 30-min slot (48 slots/day)
# 2. If a slot is consistently unoccupied (>= threshold), lower setpoint by 1°C
# 3. If a slot is consistently occupied, restore/raise setpoint toward comfort temp
# 4. Weekly Sunday 08:00 summary: slots adjusted, estimated energy saved
# 5. Gates: never go below floor (16°C), never above ceiling (22°C),
#            never adjust during Sleep mode, respect manual override flag
#
# Storage: occupancy hit/miss counters per 30-min slot stored as CSV in
# input_text (48 slots × ~4 chars = ~192 chars — fits in 255).
# Two entities: occupied_counts and total_counts (same slot index).
# Occupancy ratio = occupied / total; if ratio < 0.3 over >= 4 samples → reduce.
#
# ── HELPER ENTITIES ──────────────────────────────────────────────────────────
#
# input_text:
#   thermostat_slot_occupied_counts:
#     name: Thermostat Slot Occupied Counts (CSV, 48 slots)
#     max: 255
#   thermostat_slot_total_counts:
#     name: Thermostat Slot Total Counts (CSV, 48 slots)
#     max: 255
#   thermostat_slot_setpoints:
#     name: Thermostat Slot Setpoints (CSV, 48 slots, °C×10 as int)
#     max: 255
#
# input_number:
#   thermostat_comfort_temp:
#     name: Thermostat Comfort Temperature (°C)
#     min: 17
#     max: 24
#     step: 0.5
#     initial: 21
#     unit_of_measurement: "°C"
#     icon: mdi:thermometer-high
#
#   thermostat_eco_temp:
#     name: Thermostat Eco Temperature (°C) — unoccupied setpoint
#     min: 14
#     max: 20
#     step: 0.5
#     initial: 17
#     unit_of_measurement: "°C"
#     icon: mdi:thermometer-low
#
#   thermostat_floor_temp:
#     name: Thermostat Absolute Floor (°C)
#     min: 12
#     max: 18
#     step: 0.5
#     initial: 16
#     unit_of_measurement: "°C"
#
#   thermostat_occupied_ratio_threshold:
#     name: Occupancy Ratio Threshold for Eco Mode
#     min: 0.1
#     max: 0.9
#     step: 0.05
#     initial: 0.3
#
#   thermostat_min_samples_before_adjust:
#     name: Min Samples Before Setpoint Adjustment
#     min: 2
#     max: 12
#     step: 1
#     initial: 4
#
# input_boolean:
#   thermostat_optimizer_enabled:
#     name: Thermostat Schedule Optimizer Enabled
#     icon: mdi:thermometer-auto
#   thermostat_manual_override:
#     name: Thermostat Manual Override Active
#
# counter:
#   thermostat_slots_adjusted_this_week:
#     name: Thermostat Slots Adjusted This Week
#     initial: 0
#   thermostat_eco_activations_this_week:
#     name: Thermostat Eco Activations This Week
#     initial: 0

