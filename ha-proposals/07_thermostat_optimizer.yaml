# ── AUTOMATIONS ───────────────────────────────────────────────────────────────

- id: thermostat_optimizer_record_occupancy
  alias: '[Climate] Thermostat Optimizer — Record Occupancy'
  triggers:
    - trigger: time_pattern
      minutes: /30
  conditions:
    - condition: state
      entity_id: input_boolean.thermostat_optimizer_enabled
      state: 'on'
  actions:
    - action: script.thermostat_slot_record
  mode: single

- id: thermostat_optimizer_apply_setpoint
  alias: '[Climate] Thermostat Optimizer — Apply Slot Setpoint'
  triggers:
    - trigger: time_pattern
      minutes: /30
  conditions:
    - condition: state
      entity_id: input_boolean.thermostat_optimizer_enabled
      state: 'on'
    - condition: not
      conditions:
        - condition: state
          entity_id: input_select.room_mode
          state: Sleep
    - condition: state
      entity_id: input_boolean.thermostat_manual_override
      state: 'off'
  actions:
    - action: script.thermostat_apply_slot_setpoint
  mode: single

- id: thermostat_manual_override_detect
  alias: '[Climate] Thermostat Optimizer — Detect Manual Override'
  triggers:
    - trigger: state
      entity_id: climate.room_david_vtherm
      attribute: temperature
  conditions:
    - condition: state
      entity_id: input_boolean.thermostat_optimizer_enabled
      state: 'on'
    # Only trip if change came from a user (not from the optimizer script)
    - condition: template
      value_template: >
        {{ trigger.to_state.context.user_id is not none }}
  actions:
    - action: input_boolean.turn_on
      target: { entity_id: input_boolean.thermostat_manual_override }
  mode: single

- id: thermostat_manual_override_auto_clear
  alias: '[Climate] Thermostat Optimizer — Auto-Clear Manual Override'
  triggers:
    - trigger: state
      entity_id: input_boolean.thermostat_manual_override
      to: 'on'
      for: { hours: 4 }
  actions:
    - action: input_boolean.turn_off
      target: { entity_id: input_boolean.thermostat_manual_override }
  mode: single

- id: thermostat_sleep_mode_setpoint
  alias: '[Climate] Thermostat Optimizer — Sleep Mode Setpoint'
  triggers:
    - trigger: state
      entity_id: input_select.room_mode
      to: Sleep
  conditions:
    - condition: state
      entity_id: input_boolean.thermostat_optimizer_enabled
      state: 'on'
  actions:
    - variables:
        sleep_temp: >
          {{ [states('input_number.thermostat_eco_temp') | float(17),
              states('input_number.thermostat_floor_temp') | float(16)] | max }}
    - action: climate.set_temperature
      target: { entity_id: climate.room_david_vtherm }
      data: { temperature: "{{ sleep_temp }}" }
  mode: single

- id: thermostat_wake_mode_setpoint
  alias: '[Climate] Thermostat Optimizer — Wake Mode Setpoint'
  triggers:
    - trigger: state
      entity_id: input_select.room_mode
      from: Sleep
  conditions:
    - condition: state
      entity_id: input_boolean.thermostat_optimizer_enabled
      state: 'on'
  actions:
    - action: script.thermostat_apply_slot_setpoint
  mode: single

- id: thermostat_optimizer_weekly_summary
  alias: '[Climate] Thermostat Optimizer — Weekly Summary'
  triggers:
    - trigger: time
      at: '08:00:00'
  conditions:
    - condition: template
      value_template: "{{ now().weekday() == 6 }}"    # Sunday
    - condition: state
      entity_id: input_boolean.thermostat_optimizer_enabled
      state: 'on'
  actions:
    - variables:
        adjusted: "{{ states('counter.thermostat_slots_adjusted_this_week') | int(0) }}"
        eco_acts: "{{ states('counter.thermostat_eco_activations_this_week') | int(0) }}"
        # Rough savings estimate: each eco activation = ~30 min at 4°C lower
        # 0.1 kWh per °C-hour × 4°C × 0.5h × eco_acts
        est_kwh_saved: "{{ (0.1 * 4 * 0.5 * eco_acts) | round(2) }}"
    - action: script.notify_me
      data:
        title: "🌡️ Thermostat-Bericht (Woche)"
        message: >
          Setpoint-Anpassungen: {{ adjusted }} · Eco-Aktivierungen: {{ eco_acts }}.
          Geschätzte Einsparung: ~{{ est_kwh_saved }} kWh.
          {% if eco_acts == 0 %}Keine Eco-Slots diese Woche — Belegungsdaten werden gesammelt.{% endif %}
    - action: counter.reset
      target: { entity_id: counter.thermostat_slots_adjusted_this_week }
    - action: counter.reset
      target: { entity_id: counter.thermostat_eco_activations_this_week }
  mode: single
