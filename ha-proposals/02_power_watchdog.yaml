# Proposal: Power Consumption Watchdog
# Daily kWh threshold alert + auto-shed non-critical loads during peak tariff windows
# ── configuration.yaml additions ─────────────────────────────────────────────

# input_number:
#   daily_kwh_threshold:
#     name: Daily kWh Alert Threshold
#     min: 1
#     max: 50
#     step: 0.5
#     initial: 8
#     unit_of_measurement: kWh
#
# input_boolean:
#   peak_tariff_active:
#     name: Peak Tariff Window Active
#
# utility_meter:
#   daily_total_energy:
#     source: sensor.total_home_power   # ← confirm entity id
#     cycle: daily
#     unit_of_measurement: kWh

# ── automations.yaml additions ───────────────────────────────────────────────

- id: power_daily_kwh_watchdog
  alias: '[Power] Daily kWh Watchdog'
  triggers:
    - trigger: numeric_state
      entity_id: sensor.daily_total_energy
      above: input_number.daily_kwh_threshold
  conditions:
    - condition: template
      value_template: >
        {{ (as_timestamp(now()) - as_timestamp(
              states.automation.power_daily_kwh_watchdog.attributes.get('last_triggered', '1970-01-01'))
           ) > 3600 }}
  actions:
    - variables:
        current_kwh: "{{ states('sensor.daily_total_energy') | float(0) | round(2) }}"
        threshold_kwh: "{{ states('input_number.daily_kwh_threshold') | float(8) | round(1) }}"
        peak_active: "{{ is_state('input_boolean.peak_tariff_active', 'on') }}"
    - action: script.notify_those_at_home
      data:
        title: "⚡ Hoher Stromverbrauch"
        message: >
          Heute bereits {{ current_kwh }} kWh (Schwellenwert: {{ threshold_kwh }} kWh).
          {% if peak_active %}Aktuell Hochtarif aktiv.{% endif %}
        category: appliance
    - if:
        - condition: state
          entity_id: input_boolean.peak_tariff_active
          state: 'on'
      then:
        - action: script.shed_nonessential_loads
  mode: single

- id: power_peak_tariff_start
  alias: '[Power] Peak Tariff — Start Load Shedding'
  triggers:
    - trigger: time
      at: '07:00:00'
      id: morning_peak
    - trigger: time
      at: '17:00:00'
      id: evening_peak
  conditions:
    - condition: state
      entity_id: binary_sensor.is_anyone_at_home
      state: 'on'
    - condition: not
      conditions:
        - condition: state
          entity_id: input_select.room_mode
          state: Sleep
  actions:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.peak_tariff_active
    - action: script.notify_those_at_home
      data:
        title: "💶 Hochtarif beginnt"
        message: >
          {% if trigger.id == 'morning_peak' %}Morgen-{% else %}Abend-{% endif
          %}Hochtarif aktiv.
        category: appliance
    - action: script.shed_nonessential_loads
  mode: single

- id: power_peak_tariff_end
  alias: '[Power] Peak Tariff — End Load Shedding'
  triggers:
    - trigger: time
      at: '09:00:00'
    - trigger: time
      at: '21:00:00'
  actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.peak_tariff_active
    - action: script.notify_those_at_home
      data:
        title: "✅ Normaltarif"
        message: Hochtarif beendet. Verbraucher können wieder normal genutzt werden.
        category: appliance
  mode: single

