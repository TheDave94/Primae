# Proposal: Notification Deduplication + Rate-Limiting + Daily Stats
# ── configuration.yaml additions ─────────────────────────────────────────────

# counter:
#   notifications_sent_today: { initial: 0 }
#   notifications_suppressed_today: { initial: 0 }
#   notifications_sent_this_hour: { initial: 0 }
#
# input_number:
#   notification_hour_window_start: { min: 0, max: 9999999999, step: 1, initial: 0 }
#   notification_max_per_hour: { min: 1, max: 100, step: 1, initial: 20 }
#   notification_dedup_window_minutes: { min: 1, max: 60, step: 1, initial: 5 }
#
# input_text:
#   last_notification_key: { max: 255 }
#   last_notification_sent_at: { max: 50 }

# ── scripts.yaml replacements ────────────────────────────────────────────────

notify_me_direct:
  alias: 'Notify Me (Direct — internal)'
  fields:
    title: { required: true }
    message: { required: true }
    data: { required: false }
  sequence:
    - action: notify.mobile_app_david_phone    # ← confirm notify target
      data:
        title: "{{ title }}"
        message: "{{ message }}"
        data: "{{ data | default({}) }}"
  mode: parallel
  max: 5

notify_me:
  alias: 'Notify Me (Rate-Limited)'
  fields:
    title: { required: true }
    message: { required: false, default: '' }
    data: { required: false }
  sequence:
    - variables:
        now_ts: "{{ as_timestamp(now()) }}"
        dedup_window_s: "{{ (states('input_number.notification_dedup_window_minutes') | float(5)) * 60 }}"
        max_per_hour: "{{ states('input_number.notification_max_per_hour') | int(20) }}"
        hour_window_start: "{{ states('input_number.notification_hour_window_start') | float(0) }}"
        sent_this_hour: "{{ states('counter.notifications_sent_this_hour') | int(0) }}"
        dedup_key: "{{ (title ~ '|' ~ message[:80]) | lower }}"
        last_key: "{{ states('input_text.last_notification_key') }}"
        last_sent_ts: "{{ as_timestamp(states('input_text.last_notification_sent_at'), 0) }}"
        is_duplicate: "{{ dedup_key == last_key and (now_ts - last_sent_ts) < dedup_window_s }}"
        hour_elapsed: "{{ (now_ts - hour_window_start) > 3600 }}"
        is_rate_limited: "{{ not hour_elapsed and sent_this_hour >= max_per_hour }}"
    - if:
        - condition: template
          value_template: "{{ is_duplicate }}"
      then:
        - action: counter.increment
          target: { entity_id: counter.notifications_suppressed_today }
        - stop: "Duplicate suppressed"
    - if:
        - condition: template
          value_template: "{{ is_rate_limited }}"
      then:
        - action: counter.increment
          target: { entity_id: counter.notifications_suppressed_today }
        - stop: "Rate limit reached"
    - if:
        - condition: template
          value_template: "{{ hour_elapsed }}"
      then:
        - action: counter.reset
          target: { entity_id: counter.notifications_sent_this_hour }
        - action: input_number.set_value
          target: { entity_id: input_number.notification_hour_window_start }
          data: { value: "{{ now_ts }}" }
    - action: script.notify_me_direct
      data:
        title: "{{ title }}"
        message: "{{ message }}"
        data: "{{ data | default({}) }}"
    - action: counter.increment
      target: { entity_id: counter.notifications_sent_today }
    - action: counter.increment
      target: { entity_id: counter.notifications_sent_this_hour }
    - action: input_text.set_value
      target: { entity_id: input_text.last_notification_key }
      data: { value: "{{ dedup_key }}" }
    - action: input_text.set_value
      target: { entity_id: input_text.last_notification_sent_at }
      data: { value: "{{ now().isoformat() }}" }
  mode: queued
  max: 10

# ── automations.yaml addition — midnight stats ────────────────────────────────

- id: notification_daily_stats
  alias: '[Notifications] Daily Stats Report'
  triggers:
    - trigger: time
      at: '00:00:00'
  conditions:
    - condition: template
      value_template: >
        {{ (states('counter.notifications_sent_today') | int(0)
            + states('counter.notifications_suppressed_today') | int(0)) > 0 }}
  actions:
    - variables:
        sent: "{{ states('counter.notifications_sent_today') | int(0) }}"
        suppressed: "{{ states('counter.notifications_suppressed_today') | int(0) }}"
        total: "{{ sent + suppressed }}"
        suppress_rate: "{% if total > 0 %}{{ ((suppressed / total) * 100) | round(0) }}{% else %}0{% endif %}"
    - action: script.notify_me_direct
      data:
        title: "📊 Benachrichtigungen heute"
        message: >
          Gesendet: {{ sent }} · Unterdrückt: {{ suppressed }}
          ({{ suppress_rate }}% Unterdrückungsrate).
          {% if suppressed > sent %}⚠️ Schwellenwerte prüfen?{% endif %}
    - action: counter.reset
      target: { entity_id: counter.notifications_sent_today }
    - action: counter.reset
      target: { entity_id: counter.notifications_suppressed_today }
  mode: single
