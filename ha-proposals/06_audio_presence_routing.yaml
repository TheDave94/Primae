# ── AUTOMATIONS ───────────────────────────────────────────────────────────────

- id: audio_routing_desk_to_living
  alias: '[Audio] Presence Routing — Desk → Living Room'
  triggers:
    - trigger: state
      entity_id: binary_sensor.desk_presence
      to: 'off'
      for:
        seconds: 30
  conditions:
    - condition: state
      entity_id: input_boolean.audio_routing_enabled
      state: 'on'
    - condition: state
      entity_id: input_boolean.audio_routing_circuit_breaker
      state: 'off'
    - condition: state
      entity_id: binary_sensor.is_anyone_at_home
      state: 'on'
    - condition: not
      conditions:
        - condition: state
          entity_id: input_select.room_mode
          state: Sleep
    # Only route if living room presence is active (person actually moved there)
    - condition: state
      entity_id: binary_sensor.living_room_presence   # ← confirm entity id
      state: 'on'
    # Origin player must be playing
    - condition: state
      entity_id: media_player.desk_speaker
      state: playing
  actions:
    - action: script.audio_route_to_room
      data: { destination: living_room }
    - action: script.audio_routing_increment_trip_count
  mode: single

- id: audio_routing_living_to_desk
  alias: '[Audio] Presence Routing — Living Room → Desk'
  triggers:
    - trigger: state
      entity_id: binary_sensor.living_room_presence
      to: 'off'
      for:
        seconds: 30
  conditions:
    - condition: state
      entity_id: input_boolean.audio_routing_enabled
      state: 'on'
    - condition: state
      entity_id: input_boolean.audio_routing_circuit_breaker
      state: 'off'
    - condition: state
      entity_id: binary_sensor.is_anyone_at_home
      state: 'on'
    - condition: not
      conditions:
        - condition: state
          entity_id: input_select.room_mode
          state: Sleep
    - condition: state
      entity_id: binary_sensor.desk_presence
      state: 'on'
    - condition: state
      entity_id: media_player.living_room_speaker
      state: playing
  actions:
    - action: script.audio_route_to_room
      data: { destination: desk }
    - action: script.audio_routing_increment_trip_count
  mode: single

# ── Circuit breaker trip ──────────────────────────────────────────────────────
- id: audio_routing_circuit_breaker_check
  alias: '[Audio] Presence Routing — Circuit Breaker'
  triggers:
    - trigger: numeric_state
      entity_id: input_number.audio_routing_trip_count
      above: 3
  conditions:
    - condition: state
      entity_id: input_boolean.audio_routing_circuit_breaker
      state: 'off'
    - condition: template
      value_template: >
        {{ (as_timestamp(now())
            - states('input_number.audio_routing_trip_window_start') | float(0)) < 300 }}
  actions:
    - action: input_boolean.turn_on
      target: { entity_id: input_boolean.audio_routing_circuit_breaker }
    - action: script.notify_me
      data:
        title: "🎵 Audio-Routing pausiert"
        message: "Zu viele Raumwechsel in kurzer Zeit. Audio-Routing pausiert für 10 min."
        data:
          actions:
            - action: AUDIO_ROUTING_RESET
              title: "▶️ Jetzt reaktivieren"
  mode: single

# ── Circuit breaker auto-reset after 10 min ───────────────────────────────────
- id: audio_routing_circuit_breaker_auto_reset
  alias: '[Audio] Presence Routing — Circuit Breaker Auto Reset'
  triggers:
    - trigger: state
      entity_id: input_boolean.audio_routing_circuit_breaker
      to: 'on'
      for: { minutes: 10 }
  actions:
    - action: input_boolean.turn_off
      target: { entity_id: input_boolean.audio_routing_circuit_breaker }
    - action: input_number.set_value
      target: { entity_id: input_number.audio_routing_trip_count }
      data: { value: 0 }
  mode: single

# ── Circuit breaker manual reset via notification action ──────────────────────
- id: audio_routing_circuit_breaker_manual_reset
  alias: '[Audio] Presence Routing — Circuit Breaker Manual Reset'
  triggers:
    - trigger: event
      event_type: mobile_app_notification_action
      event_data: { action: AUDIO_ROUTING_RESET }
  actions:
    - action: input_boolean.turn_off
      target: { entity_id: input_boolean.audio_routing_circuit_breaker }
    - action: input_number.set_value
      target: { entity_id: input_number.audio_routing_trip_count }
      data: { value: 0 }
  mode: single

# ── Pause all audio on Away / Sleep ──────────────────────────────────────────
- id: audio_routing_pause_on_away
  alias: '[Audio] Presence Routing — Pause on Away'
  triggers:
    - trigger: state
      entity_id: binary_sensor.is_anyone_at_home
      to: 'off'
      for: { minutes: 2 }
  actions:
    - action: media_player.media_pause
      target:
        entity_id:
          - media_player.desk_speaker
          - media_player.living_room_speaker
      continue_on_error: true
  mode: single

- id: audio_routing_pause_on_sleep
  alias: '[Audio] Presence Routing — Pause on Sleep Mode'
  triggers:
    - trigger: state
      entity_id: input_select.room_mode
      to: Sleep
  actions:
    - action: media_player.media_pause
      target:
        entity_id:
          - media_player.desk_speaker
          - media_player.living_room_speaker
      continue_on_error: true
  mode: single

