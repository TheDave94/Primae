# Proposal: Multi-Room Audio Presence Routing
# 30s grace period, desk↔living_room follow, circuit-breaker + Sleep/Away gates
# commit: 6edf82db
#
# ── DESIGN ───────────────────────────────────────────────────────────────────
#
# When presence moves between desk and living room, audio playback follows:
# 1. Detect presence change (binary_sensor.desk_presence / binary_sensor.living_room_presence)
# 2. Wait 30s grace period (cancels if person returns to origin room)
# 3. If grace period completes: pause origin media player, resume on destination
# 4. Gates: Skip if Sleep mode, Skip if Away, Skip if circuit breaker active
# 5. Circuit breaker: if audio routing fires >3 times in 5 min (flapping), pause routing
#
# Media players assumed:
#   media_player.desk_speaker    (e.g. Sonos/Chromecast at desk)
#   media_player.living_room_speaker
# Presence sensors:
#   binary_sensor.desk_presence
#   binary_sensor.living_room_presence   ← confirm entity ids
#
# ── HELPER ENTITIES ──────────────────────────────────────────────────────────
#
# input_boolean:
#   audio_routing_enabled:
#     name: Audio Presence Routing Enabled
#     icon: mdi:headphones
#   audio_routing_circuit_breaker:
#     name: Audio Routing Circuit Breaker Active
#     icon: mdi:circuit-breaker
#
# input_number:
#   audio_routing_trip_count:
#     name: Audio Routing Trip Count (flap window)
#     min: 0
#     max: 50
#     step: 1
#     initial: 0
#   audio_routing_trip_window_start:
#     name: Audio Routing Trip Window Start (unix ts)
#     min: 0
#     max: 9999999999
#     step: 1
#     initial: 0
#
# input_text:
#   audio_routing_last_room:
#     name: Audio Routing — Last Known Room
#     max: 50
#     initial: ''

