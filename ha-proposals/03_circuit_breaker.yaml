# Proposal: Automation Circuit Breaker — Flapping Detection
# ≥3 same-entity changes in 60s → disable automations + actionable re-enable notification
# ── configuration.yaml additions ─────────────────────────────────────────────

# input_number:
#   flap_change_count: { min: 0, max: 100, step: 1, initial: 0 }
#   flap_window_start: { min: 0, max: 9999999999, step: 1, initial: 0 }
#
# input_text:
#   circuit_breaker_entity: { max: 255 }
#   circuit_breaker_triggered_at: { max: 50 }
#
# input_boolean:
#   circuit_breaker_active: { name: Circuit Breaker Active }

# ── automations.yaml additions ───────────────────────────────────────────────

- id: flap_detector_counter
  alias: '[Safety] Flap Detector — Count Changes'
  triggers:
    - trigger: event
      event_type: state_changed
  conditions:
    - condition: state
      entity_id: input_boolean.circuit_breaker_active
      state: 'off'
    - condition: template
      value_template: >
        {{ trigger.event.data.new_state is not none
           and trigger.event.data.new_state.state not in ['unavailable', 'unknown']
           and trigger.event.data.old_state is not none
           and trigger.event.data.old_state.state not in ['unavailable', 'unknown'] }}
    - condition: template
      value_template: >
        {% set domain = trigger.event.data.entity_id.split('.')[0] %}
        {{ domain not in ['input_number', 'input_boolean', 'input_text',
                          'input_select', 'counter', 'automation', 'scene',
                          'script', 'timer', 'persistent_notification'] }}
  actions:
    - variables:
        now_ts: "{{ as_timestamp(now()) }}"
        window_start: "{{ states('input_number.flap_window_start') | float(0) }}"
        current_entity: "{{ trigger.event.data.entity_id }}"
        tracked_entity: "{{ states('input_text.circuit_breaker_entity') }}"
        elapsed: "{{ now_ts - window_start }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ elapsed > 60 or current_entity != tracked_entity }}"
          sequence:
            - action: input_number.set_value
              target: { entity_id: input_number.flap_change_count }
              data: { value: 1 }
            - action: input_number.set_value
              target: { entity_id: input_number.flap_window_start }
              data: { value: "{{ now_ts }}" }
            - action: input_text.set_value
              target: { entity_id: input_text.circuit_breaker_entity }
              data: { value: "{{ current_entity }}" }
        - conditions:
            - condition: template
              value_template: "{{ elapsed <= 60 and current_entity == tracked_entity }}"
          sequence:
            - action: input_number.set_value
              target: { entity_id: input_number.flap_change_count }
              data:
                value: "{{ (states('input_number.flap_change_count') | int) + 1 }}"
  mode: queued
  max: 10

- id: circuit_breaker_trip
  alias: '[Safety] Circuit Breaker — Trip'
  triggers:
    - trigger: numeric_state
      entity_id: input_number.flap_change_count
      above: 2
  conditions:
    - condition: state
      entity_id: input_boolean.circuit_breaker_active
      state: 'off'
  actions:
    - variables:
        offending: "{{ states('input_text.circuit_breaker_entity') }}"
        count: "{{ states('input_number.flap_change_count') | int }}"
    - action: input_boolean.turn_on
      target: { entity_id: input_boolean.circuit_breaker_active }
    - action: automation.turn_off
      target:
        entity_id:
          - automation.send_pending_notifications
          - automation.washing_machine_1727779643731
          - automation.dishwasher_1728474473869
          - automation.consolidated_light_switches
      data: { stop_actions: true }
    - action: script.notify_me
      data:
        title: "⚡ Circuit Breaker Ausgelöst"
        message: "{{ offending }} hat sich {{ count }}x in 60s geändert. Automatisierungen pausiert."
        data:
          actions:
            - action: CIRCUIT_BREAKER_RESET
              title: "✅ Reaktivieren"
    - action: todo.add_item
      target: { entity_id: todo.notifications }
      data:
        item: "Circuit Breaker: {{ offending }} ({{ count }}x/60s) – {{ now().strftime('%H:%M') }}"
  mode: single

- id: circuit_breaker_reset
  alias: '[Safety] Circuit Breaker — Reset'
  triggers:
    - trigger: event
      event_type: mobile_app_notification_action
      event_data: { action: CIRCUIT_BREAKER_RESET }
  actions:
    - action: automation.turn_on
      target:
        entity_id:
          - automation.send_pending_notifications
          - automation.washing_machine_1727779643731
          - automation.dishwasher_1728474473869
          - automation.consolidated_light_switches
    - action: input_boolean.turn_off
      target: { entity_id: input_boolean.circuit_breaker_active }
    - action: input_number.set_value
      target: { entity_id: input_number.flap_change_count }
      data: { value: 0 }
    - action: script.notify_me
      data:
        title: "✅ Automatisierungen reaktiviert"
        message: "Circuit Breaker zurückgesetzt."
  mode: single

- id: circuit_breaker_auto_reset
  alias: '[Safety] Circuit Breaker — Auto Reset (30 min)'
  triggers:
    - trigger: state
      entity_id: input_boolean.circuit_breaker_active
      to: 'on'
      for: { minutes: 30 }
  actions:
    - action: automation.turn_on
      target:
        entity_id:
          - automation.send_pending_notifications
          - automation.washing_machine_1727779643731
          - automation.dishwasher_1728474473869
          - automation.consolidated_light_switches
    - action: input_boolean.turn_off
      target: { entity_id: input_boolean.circuit_breaker_active }
    - action: input_number.set_value
      target: { entity_id: input_number.flap_change_count }
      data: { value: 0 }
    - action: script.notify_me
      data:
        title: "🔄 Circuit Breaker auto-zurückgesetzt"
        message: "Automatisierungen nach 30 min reaktiviert. Prüfe {{ states('input_text.circuit_breaker_entity') }}."
  mode: single
